spring:
  application:
    name: stavia

  datasource:
    url: jdbc:postgresql://localhost:5433/stavia
    username: quizuser
    password: quizpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    user:
      name: admin
      password: admin

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

server:
  port: 8181

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

logging:
  level:
    root: INFO
    org.hibernate.orm.connections.pooling: OFF
    org.hibernate.orm.deprecation: OFF
    org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration: OFF