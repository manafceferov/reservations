databaseChangeLog:
  - changeSet:
      id: "03"
      author: stavia
      changes:
        - createTable:
            tableName: room_reservations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_room_reservations_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: room_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_room_reservations_room
                    referencedTableName: rooms
                    referencedColumnNames: id
              - column:
                  name: check_in
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: check_out
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: guest_count
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP