<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Menyu')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container flex-grow-1 py-2">
    <h4 class="section-title mb-4">🍴 Menyu</h4>

    <div th:if="${#lists.isEmpty(items)}" class="text-center text-muted py-5">
        <i class="bi bi-journal-x fs-1"></i>
        <p class="mt-3">Menyu hələ boşdur.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="item : ${items}">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h6 class="fw-bold mb-0" th:text="${item.name}"></h6>
                    <span class="badge badge-gold" th:text="${item.category}"></span>
                </div>
                <p class="text-muted small flex-grow-1" th:text="${item.description}"></p>
                <p class="fw-bold text-warning mt-2" th:text="'₼' + ${item.price}"></p>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
