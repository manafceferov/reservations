databaseChangeLog:
  - changeSet:
      id: "07"
      author: stavia
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: table_reservation_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_orders_table_reservation
                    referencedTableName: table_reservations
                    referencedColumnNames: id
              - column:
                  name: total_price
                  type: DOUBLE PRECISION
                  defaultValueNumeric: 0.0
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP