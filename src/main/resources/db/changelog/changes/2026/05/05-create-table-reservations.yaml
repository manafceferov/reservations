databaseChangeLog:
  - changeSet:
      id: "05"
      author: stavia
      changes:
        - createTable:
            tableName: table_reservations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_table_reservations_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: table_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_table_reservations_table
                    referencedTableName: restaurant_tables
                    referencedColumnNames: id
              - column:
                  name: reservation_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: reservation_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: guest_count
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP